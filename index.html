<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Quest TCG</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Meta -->
    <meta name="description" content="La comunidad TCG de Panamá — compite, colecciona y conecta." />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Prevent white flash before React mounts -->
    <!-- Disable text selection & callout globally — prevents iOS "Copy/Look Up" popup on long-press -->
    <style>
      html,body{background:#0A0A0A}
      *{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
      input,textarea,[contenteditable]{-webkit-user-select:text;user-select:text}
    </style>
  </head>
  <body>
    <div id="root" style="background:#0A0A0A;min-height:100dvh;display:flex;flex-direction:column"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
