<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Quest TCG — La comunidad TCG de Panamá</title>

    <!-- LCP optimization — preload the loading-screen logo so it paints in <1 s.
         Without this, the logo URL is only known after the JS bundle parses,
         pushing LCP to 3-5 s. With fetchpriority=high the browser kicks it off
         before the bundle even arrives. Stable filename in /public/ (no hash). -->
    <link rel="preload" as="image" href="/quest-logo-loading.png" fetchpriority="high" type="image/png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Speed up first API call to Supabase (saves ~100-200 ms on first request) -->
    <link rel="preconnect" href="https://qattyrdmlbolocnzczos.supabase.co" crossorigin />

    <!-- Fonts — Bebas Neue loaded async so it doesn't block render. The print
         media trick: link loads as non-render-blocking, then onload swaps to all. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" /></noscript>

    <!-- SEO -->
    <meta name="description" content="La comunidad TCG de Panamá — competí en torneos de Magic, Pokémon, One Piece y más. Coleccioná, tradeá y conectá con jugadores cerca tuyo." />
    <meta name="keywords" content="TCG Panamá, Magic the Gathering Panamá, Pokémon TCG, One Piece TCG, torneos cartas Panamá, hobby store Panamá" />
    <meta name="author" content="Quest TCG" />
    <link rel="canonical" href="https://questhobbystore.com" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph (WhatsApp, Discord, Facebook, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://questhobbystore.com" />
    <meta property="og:title" content="Quest TCG — La comunidad TCG de Panamá" />
    <meta property="og:description" content="Competí en torneos, coleccioná y tradeá cartas. Magic, Pokémon, One Piece, Digimon y más." />
    <meta property="og:image" content="https://questhobbystore.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Quest TCG - La comunidad TCG de Panamá" />
    <meta property="og:site_name" content="Quest TCG" />
    <meta property="og:locale" content="es_PA" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://questhobbystore.com" />
    <meta name="twitter:title" content="Quest TCG — La comunidad TCG de Panamá" />
    <meta name="twitter:description" content="Competí en torneos, coleccioná y tradeá cartas. Magic, Pokémon, One Piece, Digimon y más." />
    <meta name="twitter:image" content="https://questhobbystore.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />
    <!-- Prevent white flash before React mounts -->
    <!-- Disable text selection & callout globally — prevents iOS "Copy/Look Up" popup on long-press -->
    <!-- SF Pro on Apple devices, Inter on others — instant typography upgrade everywhere -->
    <style>
      html,body{
        /* GLASS BG — el efecto glass de las cards necesita color SATURADO
           detrás para refractar. Aumentamos alphas y agregamos fuentes
           más grandes y solapadas — la idea es que cada card con
           backdrop-filter blur tenga siempre algo de color detrás,
           independientemente de dónde esté en la página.
           Paleta = Battle Now CTA (naranja → rosa → violeta) + un
           toque cian/cobalto para variación. */
        background:
          /* Orange — top-left + bottom subtle echo */
          radial-gradient(ellipse 80% 65% at 8% 5%,    rgba(251,146,60,0.38)  0%, transparent 60%),
          radial-gradient(ellipse 60% 45% at 78% 95%,  rgba(251,146,60,0.18)  0%, transparent 65%),
          /* Pink — center-right + lower-left echo */
          radial-gradient(ellipse 75% 60% at 92% 38%,  rgba(244,114,182,0.34) 0%, transparent 62%),
          radial-gradient(ellipse 55% 45% at 18% 70%,  rgba(244,114,182,0.18) 0%, transparent 65%),
          /* Violet — bottom + center echo */
          radial-gradient(ellipse 90% 65% at 50% 115%, rgba(167,139,250,0.38) 0%, transparent 60%),
          radial-gradient(ellipse 50% 40% at 50% 45%,  rgba(167,139,250,0.18) 0%, transparent 65%),
          /* Cool accent — small cyan kicker for variety so glass picks up
             a cool tint somewhere instead of pure warm everywhere. */
          radial-gradient(ellipse 45% 38% at 32% 30%,  rgba(56,189,248,0.16)  0%, transparent 65%),
          #0A0A12;
        background-attachment:fixed;
        font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter",system-ui,sans-serif;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        text-rendering:optimizeLegibility;
        font-feature-settings:"cv02","cv03","cv04","cv11","ss01";
      }
      *{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
      input,textarea,[contenteditable]{-webkit-user-select:text;user-select:text}
      /* Tap highlight off — replaced by our own spring animations */
      button,a,[role="button"]{-webkit-tap-highlight-color:transparent}
      /* Smoother scroll inertia on iOS */
      *{scroll-behavior:smooth}
      @media (prefers-reduced-motion: reduce){
        *,*::before,*::after{
          animation-duration:.01ms !important;
          animation-iteration-count:1 !important;
          transition-duration:.01ms !important;
          scroll-behavior:auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root" style="background:transparent;min-height:100dvh;display:flex;flex-direction:column"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
